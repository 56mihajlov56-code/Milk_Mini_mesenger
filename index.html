<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milk Mini</title>
    <style>
        /* ===== ГЛОБАЛЬНЫЕ СТИЛИ ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1a; color: #e0e0e0; }
        .page { display: none; height: 100%; width: 100%; flex-direction: column; }
        .page.active { display: flex; }

        /* ===== АВТОРИЗАЦИЯ ===== */
        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-card { background: #1e1e32; border-radius: 24px; padding: 30px 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        .auth-card h1 { text-align: center; color: #a78bfa; margin-bottom: 24px; font-size: 28px; }
        .auth-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #2d2d44; padding-bottom: 8px; }
        .auth-tab { flex: 1; text-align: center; padding: 8px; cursor: pointer; color: #888; font-weight: 600; transition: 0.3s; border-radius: 12px; }
        .auth-tab.active { color: #a78bfa; background: #2d2d44; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #aaa; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #2d2d44; border-radius: 12px; background: #14142a; color: #fff; font-size: 16px; transition: 0.3s; }
        .form-group input:focus { outline: none; border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.2); }
        .auth-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #a78bfa, #7c3aed); border: none; border-radius: 12px; color: #fff; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 8px; }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(167,139,250,0.3); }

        /* ===== МЕССЕНДЖЕР ===== */
        .messenger { flex: 1; display: flex; background: #16162a; position: relative; }
        .sidebar { width: 100%; background: #1a1a30; display: flex; flex-direction: column; position: absolute; top: 0; left: 0; height: 100%; z-index: 10; transition: transform 0.3s ease; }
        .sidebar.hidden { transform: translateX(-100%); }
        .user-info { display: flex; align-items: center; padding: 16px 20px; background: #24243e; gap: 12px; flex-shrink: 0; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; overflow: hidden; border: 2px solid #a78bfa; flex-shrink: 0; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; background: #2d2d44; }
        .user-details { flex: 1; min-width: 0; }
        .user-name { font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-status { font-size: 12px; color: #888; }
        .user-status.online { color: #4ade80; }
        .header-actions { display: flex; gap: 6px; }
        .header-btn { background: none; border: none; color: #ccc; font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 10px; transition: 0.3s; }
        .header-btn:hover { background: #2d2d44; }

        .add-user { padding: 12px 16px; border-bottom: 1px solid #2d2d44; display: flex; gap: 8px; flex-shrink: 0; }
        .add-user input { flex: 1; padding: 10px 14px; border: 1px solid #2d2d44; border-radius: 20px; background: #14142a; color: #fff; font-size: 14px; }
        .add-user input:focus { outline: none; border-color: #a78bfa; }
        .add-user button { padding: 10px 18px; background: #7c3aed; border: none; border-radius: 20px; color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .add-user button:hover { background: #6d28d9; }

        .tabs { display: flex; gap: 4px; padding: 8px 12px; border-bottom: 1px solid #2d2d44; flex-shrink: 0; overflow-x: auto; }
        .tab-btn { padding: 8px 16px; border: none; border-radius: 16px; background: none; color: #888; font-weight: 600; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: #a78bfa; color: #fff; }
        .tab-btn:hover { background: #2d2d44; color: #eee; }

        .chats-list { flex: 1; overflow-y: auto; padding: 8px 12px; display: none; }
        .chats-list.active { display: block; }
        .chat-item { display: flex; align-items: center; padding: 12px 14px; border-radius: 14px; cursor: pointer; transition: 0.3s; margin-bottom: 4px; }
        .chat-item:hover { background: #24243e; }
        .chat-item.active { background: #2d2d44; }
        .chat-avatar { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; margin-right: 12px; flex-shrink: 0; position: relative; }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; background: #2d2d44; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #1a1a30; }
        .status-dot.online { background: #4ade80; }
        .status-dot.offline { background: #f87171; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; display: flex; justify-content: space-between; }
        .chat-last-msg { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: #666; flex-shrink: 0; margin-left: 8px; }

        /* ===== ЧАТ ===== */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #16162a; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 20; transform: translateX(100%); transition: transform 0.3s ease; }
        .chat-area.active { transform: translateX(0); }
        .chat-header { display: flex; align-items: center; padding: 12px 16px; background: #1e1e32; border-bottom: 1px solid #2d2d44; flex-shrink: 0; }
        .back-btn { font-size: 24px; cursor: pointer; padding: 4px 12px 4px 4px; color: #ccc; }
        .chat-header .chat-avatar { width: 40px; height: 40px; margin-right: 12px; }
        .chat-header .chat-info { flex: 1; }
        .chat-header .chat-name { font-weight: 600; font-size: 16px; }
        .chat-header .chat-status { font-size: 12px; color: #888; }
        .chat-header .chat-status.online { color: #4ade80; }

        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; margin-bottom: 8px; word-wrap: break-word; animation: fadeIn 0.2s; }
        .message.self { align-self: flex-end; background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
        .message.other { align-self: flex-start; background: #24243e; border-bottom-left-radius: 4px; }
        .message .time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .input-area { display: flex; padding: 12px 16px; background: #1a1a30; border-top: 1px solid #2d2d44; gap: 8px; flex-shrink: 0; }
        .input-area input { flex: 1; padding: 12px 16px; border: none; border-radius: 24px; background: #14142a; color: #fff; font-size: 16px; }
        .input-area input:focus { outline: none; background: #1e1e32; }
        .input-area button { padding: 12px 20px; background: #a78bfa; border: none; border-radius: 24px; color: #fff; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .input-area button:hover { background: #7c3aed; }

        .empty { text-align: center; padding: 40px 20px; color: #666; }

        /* ===== МОДАЛКИ ===== */
        .modal { display: none; position: fixed; z-index: 1000; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 20px; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #1e1e32; border-radius: 24px; max-width: 500px; width: 100%; padding: 24px; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { color: #a78bfa; font-size: 22px; }
        .modal-close { font-size: 28px; cursor: pointer; color: #888; }
        .modal-close:hover { color: #fff; }
        .modal-footer { display: flex; gap: 12px; margin-top: 20px; }
        .modal-footer button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-secondary { background: #2d2d44; color: #ccc; }
        .btn-secondary:hover { background: #3d3d5c; }
        .btn-primary { background: #a78bfa; color: #fff; }
        .btn-primary:hover { background: #7c3aed; }

        /* ===== АДАПТИВ ===== */
        @media (min-width: 768px) {
            .sidebar { position: relative; transform: none !important; width: 360px; }
            .chat-area { position: relative; transform: none !important; z-index: 1; }
            .back-btn { display: none; }
        }
    </style>
</head>
<body>

<!-- ==================== СТРАНИЦА АВТОРИЗАЦИИ ==================== -->
<div id="authPage" class="page active">
    <div class="auth-container">
        <div class="auth-card">
            <h1>🥛 Milk Mini</h1>
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Вход</div>
                <div class="auth-tab" data-tab="register">Регистрация</div>
            </div>

            <div id="loginForm" class="auth-form active">
                <form id="loginFormEl">
                    <div class="form-group">
                        <label>Логин</label>
                        <input type="text" id="loginUsername" placeholder="Введите логин" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPassword" placeholder="Введите пароль" required>
                    </div>
                    <button type="submit" class="auth-btn">Войти</button>
                </form>
            </div>

            <div id="registerForm" class="auth-form">
                <form id="registerFormEl">
                    <div class="form-group">
                        <label>Логин</label>
                        <input type="text" id="regUsername" placeholder="Придумайте логин" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="regPassword" placeholder="Минимум 6 символов" required minlength="6">
                    </div>
                    <button type="submit" class="auth-btn">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ==================== СТРАНИЦА МЕССЕНДЖЕРА ==================== -->
<div id="messengerPage" class="page">
    <div class="messenger">
        <!-- Боковая панель -->
        <div class="sidebar" id="sidebar">
            <div class="user-info">
                <div class="user-avatar">
                    <img id="myAvatar" src="" alt="avatar">
                </div>
                <div class="user-details">
                    <div class="user-name" id="myName">Загрузка...</div>
                    <div class="user-status online" id="myStatus">● онлайн</div>
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick="showSettings()" title="Настройки">⚙️</button>
                    <button class="header-btn" onclick="logout()" title="Выйти">🚪</button>
                </div>
            </div>

            <div class="add-user">
                <input type="text" id="searchUser" placeholder="Найти пользователя...">
                <button onclick="addFriend()">➕</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="chats">💬 Чаты</button>
                <button class="tab-btn" data-tab="users">👤 Пользователи</button>
            </div>

            <div id="chatsList" class="chats-list active">
                <div class="empty">Загрузка чатов...</div>
            </div>
            <div id="usersList" class="chats-list">
                <div class="empty">Загрузка пользователей...</div>
            </div>
        </div>

        <!-- Область чата -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <span class="back-btn" onclick="closeChat()">←</span>
                <div class="chat-avatar"><img id="chatAvatar" src="" alt="avatar"></div>
                <div class="chat-info">
                    <div class="chat-name" id="chatName">Выберите чат</div>
                    <div class="chat-status" id="chatStatus"></div>
                </div>
            </div>
            <div class="messages" id="messagesContainer">
                <div class="empty">Начните общение</div>
            </div>
            <div class="input-area" id="inputArea" style="display:none;">
                <input type="text" id="msgInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== МОДАЛКА НАСТРОЕК ==================== -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>⚙️ Настройки</h2>
            <span class="modal-close" onclick="closeModal('settingsModal')">&times;</span>
        </div>
        <div class="form-group">
            <label>Логин</label>
            <input type="text" id="settingsUsername">
        </div>
        <div class="form-group">
            <label>Аватар (URL)</label>
            <input type="text" id="settingsAvatar" placeholder="Ссылка на картинку">
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal('settingsModal')">Отмена</button>
            <button class="btn-primary" onclick="saveSettings()">Сохранить</button>
        </div>
    </div>
</div>

<!-- ==================== МОДАЛКА ПОДТВЕРЖДЕНИЯ ==================== -->
<div id="confirmModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>⚠️ Подтверждение</h2>
            <span class="modal-close" onclick="closeModal('confirmModal')">&times;</span>
        </div>
        <p id="confirmText" style="margin:20px 0;">Вы уверены?</p>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal('confirmModal')">Отмена</button>
            <button class="btn-primary" id="confirmBtn">Подтвердить</button>
        </div>
    </div>
</div>

<script>
    // ========================================================================
    //  КОНФИГУРАЦИЯ
    // ========================================================================
    const API_URL = 'https://s90236x2.beget.tech/api.php'; // Ваш серверный URL

    // ========================================================================
    //  ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
    // ========================================================================
    let currentUser = null;
    let currentChatId = null;
    let allUsers = [];
    let allChats = [];
    let messagesCache = {};
    let updateInterval = null;
    let isMobile = window.innerWidth < 768;
    let confirmCallback = null;

    // ========================================================================
    //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // ========================================================================
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatTime(ts) {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function getAvatarUrl(avatar) {
        return avatar || 'https://ui-avatars.com/api/?background=7c3aed&color=fff&size=64&name=User';
    }

    // ========================================================================
    //  API ВЫЗОВЫ
    // ========================================================================
    async function apiCall(action, data = {}) {
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...data, token: currentUser?.token || '' })
            });
            if (!response.ok) throw new Error('Network error');
            return await response.json();
        } catch (e) {
            console.error('API Error:', e);
            return { success: false, message: 'Ошибка соединения с сервером' };
        }
    }

    // ========================================================================
    //  АВТОРИЗАЦИЯ
    // ========================================================================
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            const target = this.dataset.tab;
            document.getElementById('loginForm').classList.toggle('active', target === 'login');
            document.getElementById('registerForm').classList.toggle('active', target === 'register');
        });
    });

    document.getElementById('loginFormEl').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) return alert('Заполните все поля!');

        const result = await apiCall('login', { username, password });
        if (result.success) {
            currentUser = result.user;
            localStorage.setItem('milk_user', JSON.stringify(currentUser));
            showMessenger();
            loadData();
            startOnlinePing();
        } else {
            alert(result.message || 'Ошибка входа');
        }
    });

    document.getElementById('registerFormEl').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!username || !password) return alert('Заполните все поля!');
        if (password.length < 6) return alert('Пароль минимум 6 символов');

        const result = await apiCall('register', { username, password });
        if (result.success) {
            alert('Регистрация успешна! Теперь войдите.');
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.querySelector('.auth-tab[data-tab="login"]').click();
        } else {
            alert(result.message || 'Ошибка регистрации');
        }
    });

    // ========================================================================
    //  ЗАГРУЗКА ДАННЫХ
    // ========================================================================
    async function loadData() {
        await loadUsers();
        await loadChats();
    }

    async function loadUsers() {
        const result = await apiCall('get_users');
        if (result.success) {
            allUsers = result.users || [];
            renderUsers(allUsers);
        }
    }

    async function loadChats() {
        const result = await apiCall('get_chats');
        if (result.success) {
            allChats = result.chats || [];
            renderChats(allChats);
        }
    }

    async function loadMessages(chatId) {
        const result = await apiCall('get_messages', { chat_id: chatId });
        if (result.success) {
            messagesCache[chatId] = result.messages || [];
            renderMessages(chatId);
        }
    }

    // ========================================================================
    //  ОТРИСОВКА
    // ========================================================================
    function renderUsers(users) {
        const container = document.getElementById('usersList');
        if (!users || users.length === 0) {
            container.innerHTML = '<div class="empty">Нет пользователей</div>';
            return;
        }
        let html = '';
        users.forEach(u => {
            const status = u.online ? 'online' : 'offline';
            const statusText = u.online ? 'онлайн' : 'офлайн';
            html += `
                <div class="chat-item" onclick="startChat('${u.id}')">
                    <div class="chat-avatar">
                        <img src="${getAvatarUrl(u.avatar)}" onerror="this.src='https://ui-avatars.com/api/?background=7c3aed&color=fff&size=64&name=${encodeURIComponent(u.username)}'">
                        <div class="status-dot ${status}"></div>
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">${escapeHtml(u.username)}</div>
                        <div class="chat-last-msg">${statusText}</div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderChats(chats) {
        const container = document.getElementById('chatsList');
        if (!chats || chats.length === 0) {
            container.innerHTML = '<div class="empty">Нет чатов. Добавьте пользователя!</div>';
            return;
        }
        let html = '';
        chats.forEach(c => {
            const isActive = currentChatId === c.id;
            const other = c.participants?.find(id => id !== currentUser.id);
            const user = allUsers.find(u => u.id === other);
            const name = user ? user.username : 'Неизвестный';
            const avatar = user ? getAvatarUrl(user.avatar) : '';
            const online = user ? user.online : false;
            html += `
                <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectChat('${c.id}')">
                    <div class="chat-avatar">
                        <img src="${avatar}" onerror="this.src='https://ui-avatars.com/api/?background=7c3aed&color=fff&size=64&name=${encodeURIComponent(name)}'">
                        <div class="status-dot ${online ? 'online' : 'offline'}"></div>
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${escapeHtml(name)}
                            <span class="chat-time">${c.last_time ? formatTime(c.last_time) : ''}</span>
                        </div>
                        <div class="chat-last-msg">${c.last_message ? escapeHtml(c.last_message) : 'Нет сообщений'}</div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderMessages(chatId) {
        const container = document.getElementById('messagesContainer');
        const msgs = messagesCache[chatId] || [];
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty">Нет сообщений</div>';
            return;
        }
        let html = '';
        msgs.forEach(m => {
            const isSelf = m.sender_id === currentUser.id;
            html += `
                <div class="message ${isSelf ? 'self' : 'other'}">
                    ${m.content}
                    <div class="time">${formatTime(m.created_at)}</div>
                </div>
            `;
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }

    // ========================================================================
    //  РАБОТА С ЧАТАМИ
    // ========================================================================
    async function startChat(userId) {
        const result = await apiCall('create_chat', { user_id: userId });
        if (result.success) {
            selectChat(result.chat_id);
        } else {
            alert(result.message || 'Ошибка создания чата');
        }
    }

    async function selectChat(chatId) {
        currentChatId = chatId;
        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll(`.chat-item[onclick*="${chatId}"]`).forEach(el => el.classList.add('active'));

        // Получаем информацию о чате
        const chat = allChats.find(c => c.id === chatId);
        if (!chat) {
            // Перезагрузим чаты
            await loadChats();
            const reloaded = allChats.find(c => c.id === chatId);
            if (!reloaded) return alert('Чат не найден');
        }
        const chatData = chat || allChats.find(c => c.id === chatId);
        const otherId = chatData.participants?.find(id => id !== currentUser.id);
        const user = allUsers.find(u => u.id === otherId);
        const name = user ? user.username : 'Неизвестный';
        const avatar = user ? getAvatarUrl(user.avatar) : '';

        document.getElementById('chatName').textContent = name;
        document.getElementById('chatAvatar').src = avatar;
        document.getElementById('chatAvatar').onerror = function() {
            this.src = `https://ui-avatars.com/api/?background=7c3aed&color=fff&size=64&name=${encodeURIComponent(name)}`;
        };
        const statusEl = document.getElementById('chatStatus');
        if (user) {
            statusEl.textContent = user.online ? '● онлайн' : 'офлайн';
            statusEl.className = 'chat-status' + (user.online ? ' online' : '');
        } else {
            statusEl.textContent = '';
        }

        if (isMobile) {
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('chatArea').classList.add('active');
        }

        document.getElementById('inputArea').style.display = 'flex';
        await loadMessages(chatId);
        document.getElementById('msgInput').focus();
    }

    function closeChat() {
        currentChatId = null;
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('chatArea').classList.remove('active');
        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
        document.getElementById('chatName').textContent = 'Выберите чат';
        document.getElementById('chatStatus').textContent = '';
        document.getElementById('chatAvatar').src = '';
        document.getElementById('messagesContainer').innerHTML = '<div class="empty">Начните общение</div>';
        document.getElementById('inputArea').style.display = 'none';
    }

    // ========================================================================
    //  ОТПРАВКА СООБЩЕНИЙ
    // ========================================================================
    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !currentChatId) return;
        input.value = '';

        const result = await apiCall('send_message', {
            chat_id: currentChatId,
            content: text
        });

        if (result.success) {
            // Обновляем сообщения
            await loadMessages(currentChatId);
            // Обновляем чаты (последнее сообщение)
            await loadChats();
        } else {
            alert(result.message || 'Ошибка отправки');
            input.value = text;
        }
    }

    // ========================================================================
    //  ПОИСК И ДОБАВЛЕНИЕ
    // ========================================================================
    async function addFriend() {
        const input = document.getElementById('searchUser');
        const username = input.value.trim();
        if (!username) return alert('Введите логин');

        const result = await apiCall('find_user', { username });
        if (result.success) {
            await startChat(result.user.id);
            input.value = '';
        } else {
            alert(result.message || 'Пользователь не найден');
        }
    }

    // ========================================================================
    //  НАСТРОЙКИ
    // ========================================================================
    function showSettings() {
        document.getElementById('settingsUsername').value = currentUser.username;
        document.getElementById('settingsAvatar').value = currentUser.avatar || '';
        document.getElementById('settingsModal').classList.add('show');
    }

    async function saveSettings() {
        const username = document.getElementById('settingsUsername').value.trim();
        const avatar = document.getElementById('settingsAvatar').value.trim();
        if (!username) return alert('Логин не может быть пустым');

        const result = await apiCall('update_profile', { username, avatar });
        if (result.success) {
            currentUser.username = username;
            currentUser.avatar = avatar;
            localStorage.setItem('milk_user', JSON.stringify(currentUser));
            document.getElementById('myName').textContent = username;
            document.getElementById('myAvatar').src = getAvatarUrl(avatar);
            closeModal('settingsModal');
            await loadData();
            alert('Профиль обновлён!');
        } else {
            alert(result.message || 'Ошибка сохранения');
        }
    }

    // ========================================================================
    //  ВЫХОД
    // ========================================================================
    function logout() {
        showConfirm('Вы уверены, что хотите выйти?', async () => {
            if (updateInterval) clearInterval(updateInterval);
            localStorage.removeItem('milk_user');
            currentUser = null;
            currentChatId = null;
            document.getElementById('messengerPage').classList.remove('active');
            document.getElementById('authPage').classList.add('active');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('chatArea').classList.remove('active');
            // Отправим offline
            await apiCall('offline');
        });
    }

    // ========================================================================
    //  ПОКАЗ МЕССЕНДЖЕРА
    // ========================================================================
    function showMessenger() {
        document.getElementById('authPage').classList.remove('active');
        document.getElementById('messengerPage').classList.add('active');
        document.getElementById('myName').textContent = currentUser.username;
        document.getElementById('myAvatar').src = getAvatarUrl(currentUser.avatar);
        document.getElementById('myAvatar').onerror = function() {
            this.src = `https://ui-avatars.com/api/?background=7c3aed&color=fff&size=64&name=${encodeURIComponent(currentUser.username)}`;
        };
    }

    // ========================================================================
    //  ОНЛАЙН-ПИНГ
    // ========================================================================
    function startOnlinePing() {
        if (updateInterval) clearInterval(updateInterval);
        updateInterval = setInterval(async () => {
            if (currentUser) {
                await apiCall('update_online');
            }
        }, 10000);
    }

    // ========================================================================
    //  МОДАЛЬНЫЕ ОКНА
    // ========================================================================
    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
    }

    function showConfirm(text, callback) {
        document.getElementById('confirmText').textContent = text;
        document.getElementById('confirmBtn').onclick = () => {
            closeModal('confirmModal');
            if (callback) callback();
        };
        document.getElementById('confirmModal').classList.add('show');
    }

    // ========================================================================
    //  ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
    // ========================================================================
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const tab = this.dataset.tab;
            document.getElementById('chatsList').classList.toggle('active', tab === 'chats');
            document.getElementById('usersList').classList.toggle('active', tab === 'users');
            if (tab === 'users') loadUsers();
            else loadChats();
        });
    });

    // ========================================================================
    //  МОБИЛЬНЫЙ СВАЙП ДЛЯ ЗАКРЫТИЯ ЧАТА
    // ========================================================================
    let touchStartX = 0;
    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    });
    document.addEventListener('touchend', e => {
        const delta = e.changedTouches[0].screenX - touchStartX;
        if (delta > 100 && isMobile && currentChatId) {
            closeChat();
        }
    });

    // ========================================================================
    //  АВТООБНОВЛЕНИЕ ЧАТОВ И СООБЩЕНИЙ
    // ========================================================================
    setInterval(async () => {
        if (currentUser) {
            await loadChats();
            if (currentChatId) {
                await loadMessages(currentChatId);
            }
        }
    }, 5000);

    // ========================================================================
    //  ИНИЦИАЛИЗАЦИЯ
    // ========================================================================
    document.addEventListener('DOMContentLoaded', () => {
        isMobile = window.innerWidth < 768;
        const saved = localStorage.getItem('milk_user');
        if (saved) {
            try {
                currentUser = JSON.parse(saved);
                showMessenger();
                loadData();
                startOnlinePing();
            } catch (e) {
                localStorage.removeItem('milk_user');
            }
        }

        // Закрытие модалок по клику вне
        document.querySelectorAll('.modal').forEach(m => {
            m.addEventListener('click', (e) => {
                if (e.target === m) m.classList.remove('show');
            });
        });
    });
</script>
</body>
</html>
